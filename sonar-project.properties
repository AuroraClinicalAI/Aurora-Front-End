# Identificación del Proyecto
sonar.projectKey=frontend
sonar.projectName=Frontend Web App
sonar.projectVersion=1.0.0

# Codificación
sonar.sourceEncoding=UTF-8

# Lenguajes
sonar.language=ts,js

# Directorios de análisis
# Apuntamos a 'src' donde reside el código de la aplicación
sonar.sources=src

# Directorio de pruebas (descomentar cuando existan tests)
# sonar.tests=src
# sonar.test.inclusions=src/**/*.test.tsx,src/**/*.test.ts,src/**/*.spec.tsx,src/**/*.spec.ts

# Reporte de Cobertura
# SonarQube buscará el archivo lcov.info generado típicamente por Vitest/Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusiones de Análisis de Código
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.config.js,**/*.config.ts,**/components.json

# Exclusiones de Cobertura (No exigir cobertura a archivos de configuración o autogenerados)
sonar.coverage.exclusions=**/*.config.js,**/*.config.ts,**/*.d.ts,src/main.tsx,src/vite-env.d.ts
